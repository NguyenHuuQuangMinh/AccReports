{% extends "Misa/layout/base.html" %}
{% block title %}Edit Roles{% endblock %}

{% block content %}
<h2>✏️ Chỉnh sửa Role</h2>

<form method="post" enctype="multipart/form-data" class="user-edit-form">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="form-group">
        <label>Tên Bộ phận</label>
        <input name= "name" type="text" value="{{ brand.BrandName }}">
    </div>

     <div class="form-group-logo">
         <div class="color-box">
            <label>Màu</label>
            <input type="color" name="color" value="{{ brand.Color }}" required>
         </div>
         <div class="logo-box">
             <label>Logo hiện tại</label>
             <div class="logo-preview">
                <img src="{{ url_for('static', filename=brand.LogoLink) }}" class="logo-square">
             </div>
         </div>

    </div>

    <div class="form-group">
        <label>Chọn logo mới (nếu muốn đổi)</label>
        <input type="file" name="logo" accept="image/*">
    </div>

    <div class="form-group">
        <label>Status</label>
        <select name="status">
            <option value="1" {{ 'selected' if brand.Status == 1 }}>Active</option>
            <option value="0" {{ 'selected' if brand.Status == 0 }}>Inactive</option>
        </select>
    </div>

    <div class="form-actions">
        <button type="submit" class="btn">💾 Lưu</button>
        <a href="{{ url_for('admin.brands') }}" class="btn cancel">⬅ Quay lại</a>
    </div>

</form>
{% endblock %}

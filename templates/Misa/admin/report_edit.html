{% extends "Misa/layout/base.html" %}
{% block title %}Edit User{% endblock %}

{% block content %}
<h2>✏️ Chỉnh sửa Report</h2>

<form method="post" class="user-edit-form">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="form-group">
        <label>Tên Report</label>
        <input type="text" name="name"
               value="{{ report.ReportName }}" required>
    </div>

    <div class="form-group">
        <label>Đường link</label>
        <input type="text" name="file_url"
               value="{{ report.FilePath }}" required>
    </div>

    <div class="form-group">
        <label>Link Download</label>
        <input type="text" name="file_download"
               value="{{ report.DownloadLink }}" required>
    </div>

    <div class="form-group">
        <label>Mô tả</label>
        <input type="text" name="description"
               value="{{ report.Description }}" required>
    </div>



    <div class="form-group">
        <label>Parameters</label>

        <div id="params-wrapper">
            {% for p in report.Params %}
            <div class="param-row">
                <input type="hidden" name="param_id[]" value="{{ p.id }}">

                <input type="text"
                       name="param_name[]"
                       value="{{ p.name }}"
                       class="param-name"
                       placeholder="Param name">

                <input type="text"
                       name="param_value[]"
                       value="{{ p.value }}"
                       class="param-value"
                       placeholder="Value">

                <input type="text"
                       name="param_label[]"
                       value="{{ p.label }}"
                       class="param-label"
                       placeholder="format">

                <select name="param_type[]" class="param-type">
                    <option value="string" {% if p.datatype == 'string' %}selected{% endif %}>Text</option>
                    <option value="int" {% if p.datatype == 'int' %}selected{% endif %}>Số nguyên</option>
                    <option value="decimal" {% if p.datatype == 'decimal' %}selected{% endif %}>Số thập phân</option>
                    <option value="date" {% if p.datatype == 'date' %}selected{% endif %}>Ngày</option>
                    <option value="datetime" {% if p.datatype == 'datetime' %}selected{% endif %}>Ngày & giờ</option>
                </select>

                <label class="param-flag">
                    <input type="checkbox"
                           name="allow_null[{{ loop.index0 }}]"
                           value="1"
                           {% if p.allow_null == 1 %}checked{% endif %}>
                    Null
                </label>

                <label class="param-flag">
                    <input type="checkbox"
                           name="allow_all[{{ loop.index0 }}]"
                           value="1"
                           {% if p.allow_all == 1 %}checked{% endif %}>
                    All
                </label>

                <button type="button" class="btn remove-param">✖</button>
            </div>
            {% endfor %}
        </div>

        <button type="button" id="add-param" class="btn add-param">
            ➕ Thêm param
        </button>
    </div>

    <div class="form-group">
        <label>Status</label>
        <select name="status">
            <option value="1" {{ 'selected' if report.Status == 1 }}>Active</option>
            <option value="0" {{ 'selected' if report.Status == 0 }}>Inactive</option>
        </select>

        <label>Thể loại</label>
        <select name="category">
            <option value="">-- Chọn thể loại --</option>
            {% for c in categories %}
                <option value="{{ c.id }}"
                    {{ 'selected' if report.CategoryId == c.id }}>
                    {{ c.name }}
                </option>
            {% endfor %}
        </select>
    </div>

    <div class="form-actions">
        <button type="submit" class="btn">💾 Lưu</button>
        <a href="{{ url_for('admin.reports') }}" class="btn cancel">⬅ Quay lại</a>
    </div>

</form>
{% endblock %}


{% block scripts %}
    <script src="{{ url_for('static', filename='js/Misa/report.js') }}"></script>
{% endblock %}

{% extends "Misa/layout/base.html" %}
{% block title %}Edit Roles{% endblock %}

{% block content %}
<h2>✏️ Chỉnh sửa Role</h2>

<form method="post" class="user-edit-form">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="form-group">
        <label>Tên Role</label>
        <input name= "name" type="text" value="{{ role.RoleName }}">
    </div>

    <div class="form-group">
        <label>Status</label>
        <select name="status">
            <option value="1" {{ 'selected' if role.Status == 1 }}>Active</option>
            <option value="0" {{ 'selected' if role.Status == 0 }}>Inactive</option>
        </select>
    </div>

    <div class="form-actions">
        <button type="submit" class="btn">💾 Lưu</button>
        <a href="{{ url_for('admin.roles') }}" class="btn cancel">⬅ Quay lại</a>
    </div>

</form>
{% endblock %}
